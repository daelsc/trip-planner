<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Itinerary</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; line-height: 1.6; padding: 2rem; max-width: 720px; margin: 0 auto; }
h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.25rem; }
.trip-meta { color: #666; font-size: 0.85rem; margin-bottom: 1.5rem; }
.updated { color: #999; font-size: 0.75rem; margin-bottom: 1.5rem; }
.edit-link { font-size: 0.8rem; margin-bottom: 1.5rem; }
.edit-link a { color: #2563eb; text-decoration: none; }
.edit-link a:hover { text-decoration: underline; }
.leg { border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 1rem; overflow: hidden; }
.leg-header { background: #f8f8f8; padding: 0.4rem 1rem; font-size: 0.78rem; font-weight: 600; color: #666; border-bottom: 1px solid #e0e0e0; }
.leg-body { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0; }
.leg-col { padding: 0.75rem 1rem; }
.leg-mid { padding: 0.75rem 0.5rem; display: flex; align-items: center; justify-content: center; border-left: 1px solid #e0e0e0; border-right: 1px solid #e0e0e0; }
.leg-mid .block-time { font-family: 'SF Mono', 'Menlo', monospace; font-size: 0.85rem; font-weight: 600; color: #666; }
.leg-col + .leg-mid { }
.leg-col:last-child { }
.leg-col h3 { font-size: 0.7rem; text-transform: uppercase; color: #999; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
.airport-code { font-size: 1.3rem; font-weight: 700; font-family: 'SF Mono', 'Menlo', monospace; }
.airport-name { font-size: 0.8rem; color: #666; }
.time-display { margin-top: 0.5rem; }
.time-primary { font-size: 1.05rem; font-weight: 600; font-family: 'SF Mono', 'Menlo', monospace; }
.time-tz { color: #666; font-size: 0.8rem; }
.time-date { color: #999; font-size: 0.75rem; }
.fbo-info { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #eee; }
.fbo-name { font-weight: 600; font-size: 0.82rem; }
.fbo-detail { font-size: 0.8rem; color: #666; }
.fbo-detail a { color: #2563eb; text-decoration: none; }
.no-trip { text-align: center; padding: 3rem; color: #999; }
.loading { text-align: center; padding: 3rem; color: #999; }
@media print {
  body { padding: 0.5rem; }
  .updated, .edit-link { display: none; }
}
@media (max-width: 500px) {
  body { padding: 1rem; }
  .leg-body { grid-template-columns: 1fr; }
  .leg-mid { border-left: none; border-right: none; border-top: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; }
}
</style>
</head>
<body>
<div id="content" class="loading">Loading trip...</div>

<script>
const PROFILES = {
  G550:   { speed: 478, climbSpeed: 325, descentSpeed: 325, phaseMin: 15, startup: 20, shutdown: 10, alt: 400 },
  PC12:   { speed: 270, climbSpeed: 180, descentSpeed: 180, phaseMin: 15, startup: 10, shutdown: 5, alt: 280 },
  custom: { speed: 250, startup: 10, shutdown: 5, alt: 350 },
};

const ALT_PRESSURE = [
  [53000,100],[45000,150],[39000,200],[34000,250],[30000,300],
  [24000,400],[18000,500],[14000,600],[10000,700],[5000,850],[3000,900],
];
function altToPressure(ft) {
  for (const [a, p] of ALT_PRESSURE) if (ft >= a) return p;
  return 1000;
}

const R_NM = 3440.065, toRad = d => d * Math.PI / 180;
function haversine(lat1, lon1, lat2, lon2) {
  const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return 2 * R_NM * Math.asin(Math.sqrt(a));
}
function bearing(lat1, lon1, lat2, lon2) {
  const dLon = toRad(lon2-lon1), la1 = toRad(lat1), la2 = toRad(lat2);
  const y = Math.sin(dLon)*Math.cos(la2);
  const x = Math.cos(la1)*Math.sin(la2) - Math.sin(la1)*Math.cos(la2)*Math.cos(dLon);
  return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
}

function fmtDur(min) {
  if (min == null || min < 0) return '\u2014';
  const total = Math.round(min);
  const h = Math.floor(total/60), m = total % 60;
  return `${h}:${m.toString().padStart(2,'0')}`;
}

function fmtInTz(date, tz) {
  const time = date.toLocaleString('en-US', { timeZone: tz, hour:'2-digit', minute:'2-digit', hour12: false });
  let abbr;
  try { abbr = date.toLocaleString('en-US', { timeZone: tz, timeZoneName:'short' }).split(' ').pop(); }
  catch { abbr = tz.split('/').pop(); }
  return { time, abbr };
}

function fmtDate(date, tz) {
  return date.toLocaleString('en-US', { timeZone: tz, weekday:'short', month:'short', day:'numeric' });
}

function dateInTz(dtStr, tz) {
  const [dp, tp] = dtStr.split('T');
  const [y,mo,d] = dp.split('-').map(Number);
  const [h,m] = tp.split(':').map(Number);
  let guess = new Date(Date.UTC(y, mo-1, d, h, m, 0));
  for (let i = 0; i < 3; i++) {
    const f = new Intl.DateTimeFormat('en-US', {
      timeZone:tz, year:'numeric', month:'numeric', day:'numeric',
      hour:'numeric', minute:'numeric', hour12:false
    });
    const parts = {};
    for (const {type, value} of f.formatToParts(guess)) parts[type] = +value;
    const diff = ((h - parts.hour)*60 + (m - parts.minute))*60000 + (d - parts.day)*86400000;
    guess = new Date(guess.getTime() + diff);
  }
  return guess;
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let aptIdx = {};
const fboCache = {};

async function fetchFbos(icao) {
  if (!icao || fboCache[icao]) return fboCache[icao] || [];
  try {
    const r = await fetch(`fbo.php?icao=${encodeURIComponent(icao)}`);
    const data = await r.json();
    fboCache[icao] = data.fbos || [];
  } catch { fboCache[icao] = []; }
  return fboCache[icao];
}

async function fetchWindForLeg(dep, arr, hPa, departTime) {
  if (!dep || !arr) return null;
  try {
    const midLat = ((dep.lat + arr.lat) / 2).toFixed(2);
    const midLon = ((dep.lon + arr.lon) / 2).toFixed(2);
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${midLat}&longitude=${midLon}&hourly=wind_speed_${hPa}hPa,wind_direction_${hPa}hPa&wind_speed_unit=kn&forecast_days=2&timezone=UTC`;
    const resp = await fetch(url);
    const data = await resp.json();
    const speeds = data.hourly[`wind_speed_${hPa}hPa`];
    const dirs = data.hourly[`wind_direction_${hPa}hPa`];
    const times = data.hourly.time;
    let targetHour = new Date().toISOString().slice(0,13) + ':00';
    if (departTime) targetHour = departTime.toISOString().slice(0,13) + ':00';
    let bestIdx = 0;
    for (let t = 0; t < times.length; t++) {
      if (times[t] <= targetHour) bestIdx = t;
    }
    const windSpd = speeds[bestIdx];
    const windDir = dirs[bestIdx];
    const track = bearing(dep.lat, dep.lon, arr.lat, arr.lon);
    const hw = windSpd * Math.cos(toRad(windDir - track));
    return Math.round(hw);
  } catch { return 0; }
}

function calcFlightMin(distNm, profile, hw) {
  if (distNm == null || profile.speed <= 0) return null;
  const cruiseGs = Math.max(50, profile.speed - hw);
  if (profile.climbSpeed && profile.descentSpeed && profile.phaseMin) {
    const climbGs = Math.max(50, profile.climbSpeed - hw);
    const descentGs = Math.max(50, profile.descentSpeed - hw);
    const climbDist = climbGs * (profile.phaseMin / 60);
    const descentDist = descentGs * (profile.phaseMin / 60);
    if (distNm <= climbDist + descentDist) {
      return (distNm / ((climbGs + descentGs) / 2)) * 60;
    }
    const cruiseDist = distNm - climbDist - descentDist;
    return profile.phaseMin + (cruiseDist / cruiseGs) * 60 + profile.phaseMin;
  }
  return (distNm / cruiseGs) * 60;
}

async function loadAndRender() {
  const params = new URLSearchParams(location.search);
  const tripId = params.get('id');
  if (!tripId) {
    document.getElementById('content').innerHTML = '<div class="no-trip">No trip specified. Add ?id=... to the URL.</div>';
    return;
  }

  // Load airports + trip data in parallel
  const [aptData, tripResp] = await Promise.all([
    fetch('airports.json').then(r => r.json()),
    fetch(`trips.php?id=${encodeURIComponent(tripId)}`),
  ]);

  for (const a of aptData) aptIdx[a.icao] = a;

  if (!tripResp.ok) {
    document.getElementById('content').innerHTML = '<div class="no-trip">Trip not found.</div>';
    return;
  }
  const trip = await tripResp.json();
  if (trip.error) {
    document.getElementById('content').innerHTML = `<div class="no-trip">${esc(trip.error)}</div>`;
    return;
  }

  const p = trip.state;
  const aircraftType = p.a || 'G550';
  const base = PROFILES[aircraftType] || PROFILES.custom;
  const profile = {
    speed: p.os ? +p.os : base.speed,
    climbSpeed: p.oc ? +p.oc : (base.climbSpeed || null),
    descentSpeed: p.od ? +p.od : (base.descentSpeed || null),
    phaseMin: base.phaseMin || null,
    startup: p.osu != null ? +p.osu : base.startup,
    shutdown: p.osd != null ? +p.osd : base.shutdown,
    alt: p.fl ? +p.fl : base.alt,
  };

  if (!p.l) {
    document.getElementById('content').innerHTML = '<div class="no-trip">No legs in this trip.</div>';
    return;
  }

  const pairs = p.l.split(',');
  const grounds = p.g ? p.g.split(',') : [];
  const deps = p.d ? p.d.split(',') : [];
  const depDates = p.dd ? p.dd.split(',') : [];
  const dfbos = p.df ? p.df.split('|') : [];
  const afbos = p.af ? p.af.split('|') : [];
  const pxCounts = p.px ? p.px.split(',') : [];

  const legs = pairs.map((pair, i) => {
    const [dep, arr] = pair.split('-');
    return {
      dep: dep||'', arr: arr||'',
      groundMin: (grounds[i] != null && grounds[i] !== '') ? +grounds[i] : null,
      nextDep: deps[i] || '',
      nextDepDate: depDates[i] || '',
      depFbo: dfbos[i] || '',
      pax: pxCounts[i] ? +pxCounts[i] : 0,
      arrFbo: afbos[i] || '',
    };
  });

  // Enforce dep = previous arr
  for (let i = 1; i < legs.length; i++) {
    if (legs[i-1].arr) legs[i].dep = legs[i-1].arr;
  }

  // Pre-fetch FBOs for all airports with FBO selections
  const fboIcaos = new Set();
  for (let i = 0; i < legs.length; i++) {
    if (i === 0 && legs[i].depFbo && legs[i].dep) fboIcaos.add(legs[i].dep);
    if (legs[i].arrFbo && legs[i].arr) fboIcaos.add(legs[i].arr);
  }
  await Promise.all([...fboIcaos].map(ic => fetchFbos(ic)));

  // Two-pass time computation (matches index.html):
  // Pass 1: compute times without wind to get approximate departure times
  // Pass 2: fetch wind using those departure times, recompute with wind
  const altFt = (profile.alt || 350) * 100;
  const hPa = altToPressure(altFt);

  function computeTimes(winds) {
    const startVal = p.t || '';
    let currentTime = null;
    if (startVal) {
      const firstDep = legs[0]?.dep;
      const firstTz = aptIdx[firstDep]?.tz || 'UTC';
      currentTime = dateInTz(startVal, firstTz);
    }

    const results = [];
    for (let i = 0; i < legs.length; i++) {
      const leg = legs[i];
      const depApt = aptIdx[leg.dep], arrApt = aptIdx[leg.arr];
      const depTz = depApt?.tz, arrTz = arrApt?.tz;

      const distNm = (depApt && arrApt) ? haversine(depApt.lat, depApt.lon, arrApt.lat, arrApt.lon) : null;
      const hw = winds[i] || 0;
      const flightMin = calcFlightMin(distNm, profile, hw);
      const blockMin = (flightMin != null) ? profile.startup + flightMin + profile.shutdown : null;

      let departTime = null, arriveTime = null;
      if (currentTime && blockMin != null) {
        departTime = new Date(currentTime.getTime());
        arriveTime = new Date(currentTime.getTime() + blockMin * 60000);
      }

      results.push({ leg, depApt, arrApt, depTz, arrTz, blockMin, departTime, arriveTime });

      // Advance clock
      if (i < legs.length - 1 && arriveTime) {
        const nextLeg = legs[i+1];
        const nextDepApt = aptIdx[nextLeg.dep];
        const nextDepTz = nextDepApt?.tz || arrTz || 'UTC';
        const defaultMin = profile.startup + profile.shutdown;

        if (leg.nextDep || leg.nextDepDate) {
          const useDate = leg.nextDepDate || new Intl.DateTimeFormat('en-CA', { timeZone: nextDepTz, year:'numeric', month:'2-digit', day:'2-digit' }).format(arriveTime);
          const useTime = leg.nextDep || new Intl.DateTimeFormat('en-GB', { timeZone: nextDepTz, hour:'2-digit', minute:'2-digit', hour12:false }).format(arriveTime);
          let depOverride = dateInTz(`${useDate}T${useTime}`, nextDepTz);
          while (depOverride < arriveTime) depOverride = new Date(depOverride.getTime() + 86400000);
          currentTime = depOverride;
        } else {
          const gMin = leg.groundMin ?? defaultMin;
          currentTime = new Date(arriveTime.getTime() + gMin * 60000);
        }
      } else if (arriveTime) {
        currentTime = arriveTime;
      }
    }
    return results;
  }

  // Pass 1: no wind
  const noWindResults = computeTimes(legs.map(() => 0));

  // Pass 2: fetch wind using pass-1 departure times, then recompute
  const windFetches = legs.map((leg, i) => {
    const depApt = aptIdx[leg.dep], arrApt = aptIdx[leg.arr];
    return fetchWindForLeg(depApt, arrApt, hPa, noWindResults[i]?.departTime);
  });
  const winds = await Promise.all(windFetches);
  const calcResults = computeTimes(winds.map(w => w || 0));

  // Attach FBO info
  const computed = calcResults.map((c, i) => {
    const leg = c.leg;
    let depFboInfo = null, arrFboInfo = null;
    const depFboName = (i === 0) ? leg.depFbo : (legs[i-1]?.arrFbo || '');
    if (depFboName && fboCache[leg.dep]) {
      depFboInfo = fboCache[leg.dep].find(f => f.name === depFboName) || null;
    }
    if (leg.arrFbo && fboCache[leg.arr]) {
      arrFboInfo = fboCache[leg.arr].find(f => f.name === leg.arrFbo) || null;
    }
    return { ...c, depFboInfo, arrFboInfo };
  });

  // Build title with date range
  const firstDept = computed[0]?.departTime;
  const lastArr = computed[computed.length-1]?.arriveTime;
  const firstDepTz = computed[0]?.depTz || 'UTC';
  const lastArrTz = computed[computed.length-1]?.arrTz || 'UTC';
  let titleDate = '';
  if (firstDept) {
    const startMonth = firstDept.toLocaleString('en-US', { timeZone: firstDepTz, month:'long' });
    const startDay = firstDept.toLocaleString('en-US', { timeZone: firstDepTz, day:'numeric' });
    if (lastArr) {
      const endMonth = lastArr.toLocaleString('en-US', { timeZone: lastArrTz, month:'long' });
      const endDay = lastArr.toLocaleString('en-US', { timeZone: lastArrTz, day:'numeric' });
      if (startMonth === endMonth && startDay === endDay) {
        titleDate = `${startMonth} ${startDay}`;
      } else if (startMonth === endMonth) {
        titleDate = `${startMonth} ${startDay} - ${endDay}`;
      } else {
        titleDate = `${startMonth} ${startDay} - ${endMonth} ${endDay}`;
      }
    } else {
      titleDate = `${startMonth} ${startDay}`;
    }
  }

  // Build edit link URL from saved state
  const editParams = new URLSearchParams(p);
  editParams.set('load', tripId);
  const editUrl = `index.html?${editParams.toString()}`;

  // Build Google Calendar link
  const paxUrl = location.href;
  let gcalHtml = '';
  if (firstDept && lastArr) {
    const gcalFmt = d => d.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
    const gcalParams = new URLSearchParams({
      action: 'TEMPLATE',
      text: `${trip.route}`,
      dates: `${gcalFmt(firstDept)}/${gcalFmt(lastArr)}`,
      details: `Live itinerary: ${paxUrl}`,
    });
    const gcalUrl = `https://calendar.google.com/calendar/render?${gcalParams.toString()}`;
    gcalHtml = ` · <a href="${esc(gcalUrl)}" target="_blank">Add to Google Calendar</a>`;
  }

  // Render
  const heading = 'N785QS' + (titleDate ? ' ' + titleDate : '') + ' Itinerary';
  let html = `<h1>${esc(heading)}</h1>`;
  html += `<div class="trip-meta">${esc(trip.route)}</div>`;
  html += `<div class="edit-link"><a href="${esc(editUrl)}">Edit trip</a>${gcalHtml}</div>`;

  for (let i = 0; i < computed.length; i++) {
    const c = computed[i];
    const { leg, depApt, arrApt, depTz, arrTz, blockMin, departTime, arriveTime, depFboInfo, arrFboInfo } = c;

    html += `<div class="leg">`;
    html += `<div class="leg-header">Leg ${i + 1}${leg.pax ? ` \u2014 ${leg.pax} passenger${leg.pax > 1 ? 's' : ''}` : ''}</div>`;

    html += `<div class="leg-body">`;

    // Departure column
    html += `<div class="leg-col">`;
    html += `<h3>Depart</h3>`;
    html += `<div class="airport-code">${esc(leg.dep)}</div>`;
    if (depApt) html += `<div class="airport-name">${esc(depApt.city)}${depApt.state ? ', ' + esc(depApt.state) : ''}</div>`;
    if (departTime && depTz) {
      const t = fmtInTz(departTime, depTz);
      html += `<div class="time-display">`;
      html += `<span class="time-primary">${t.time}</span> <span class="time-tz">${t.abbr}</span>`;
      html += `<div class="time-date">${fmtDate(departTime, depTz)}</div>`;
      html += `</div>`;
    }
    if (depFboInfo) {
      html += `<div class="fbo-info">`;
      html += `<div class="fbo-name">${esc(depFboInfo.name)}</div>`;
      if (depFboInfo.address) html += `<div class="fbo-detail"><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(depFboInfo.address)}" target="_blank">${esc(depFboInfo.address)}</a></div>`;
      if (depFboInfo.phone) html += `<div class="fbo-detail"><a href="tel:${esc(depFboInfo.phone)}">${esc(depFboInfo.phone)}</a></div>`;
      html += `</div>`;
    }
    html += `</div>`;

    // Block time column
    html += `<div class="leg-mid"><span class="block-time">${blockMin != null ? fmtDur(blockMin) : '\u2014'}</span></div>`;

    // Arrival column
    html += `<div class="leg-col">`;
    html += `<h3>Arrive</h3>`;
    html += `<div class="airport-code">${esc(leg.arr)}</div>`;
    if (arrApt) html += `<div class="airport-name">${esc(arrApt.city)}${arrApt.state ? ', ' + esc(arrApt.state) : ''}</div>`;
    if (arriveTime && arrTz) {
      const t = fmtInTz(arriveTime, arrTz);
      html += `<div class="time-display">`;
      html += `<span class="time-primary">${t.time}</span> <span class="time-tz">${t.abbr}</span>`;
      html += `<div class="time-date">${fmtDate(arriveTime, arrTz)}</div>`;
      html += `</div>`;
    }
    if (arrFboInfo) {
      html += `<div class="fbo-info">`;
      html += `<div class="fbo-name">${esc(arrFboInfo.name)}</div>`;
      if (arrFboInfo.address) html += `<div class="fbo-detail"><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(arrFboInfo.address)}" target="_blank">${esc(arrFboInfo.address)}</a></div>`;
      if (arrFboInfo.phone) html += `<div class="fbo-detail"><a href="tel:${esc(arrFboInfo.phone)}">${esc(arrFboInfo.phone)}</a></div>`;
      html += `</div>`;
    }
    html += `</div>`;

    html += `</div></div>`;

  }

  const saved = trip.saved ? new Date(trip.saved) : null;
  if (saved) {
    html += `<div class="updated">Last updated ${saved.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })}</div>`;
  }

  document.getElementById('content').innerHTML = html;
  document.title = heading;
}

// Initial load
loadAndRender();
// Auto-refresh every 60 seconds
setInterval(loadAndRender, 60000);
</script>
</body>
</html>
